<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study - Nivrutti Dandekar</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/case-study.css">

  <!-- Lenis CSS -->
  <style>
    html.lenis {
      height: auto;
    }

    .lenis.lenis-smooth {
      scroll-behavior: auto;
    }

    .lenis.lenis-smooth [data-lenis-prevent] {
      overscroll-behavior: contain;
    }

    .lenis.lenis-stopped {
      overflow: hidden;
    }

    .lenis.lenis-scrolling iframe {
      pointer-events: none;
    }

    /* Reduced header for inner pages */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: var(--space-md) 0;
      z-index: 100;
      background: rgba(5, 5, 5, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">ND.</a>
    </div>
  </nav>

  <!-- Main Content injected via case-study.js -->
  <main id="case-study-content">
    <!-- fallback loader -->
    <div class="container" style="padding: 200px 0; text-align: center;">
      <div style="opacity: 0.5;">Loading Case Study...</div>
    </div>
  
    <!-- Footer CTA Section -->
    <section id="contact" class="footer-cta container">
      <div class="reveal-up">
        <h2>Let’s create something amazing together</h2>
        <p class="body-large">I’m currently available for freelance projects and open to discussing new opportunities.
          Feel free to reach out if you want to collaborate!</p>
        <a href="https://www.linkedin.com/in/nivrutti-dandekar-71638768/" class="btn btn-primary" target="_blank">
          Say Hello <i data-lucide="message-circle"></i>
        </a>
      </div>
    </section>
  </main>

  <footer class="container" style="padding: 40px 0; border-top: 1px solid var(--border-color); text-align: center;">
    <p class="caption" style="color: var(--text-secondary);">&copy; 2026 Nivrutti Dandekar. Designed with precision and
      purposeful intent.</p>
  </footer>

  <!-- Footer -->

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/case-study.js"></script>
</body>

</html>
